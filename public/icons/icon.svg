<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Stoa — The Reading Room">
  <!-- Background: deep midnight, the temple at night -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d121a"/>
      <stop offset="100%" stop-color="#070a10"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#efe7d4"/>
      <stop offset="100%" stop-color="#d8ceb6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Acroterion (small ornament at apex) -->
  <circle cx="256" cy="78" r="10" fill="url(#stone)"/>

  <!-- Pediment (triangular roof) -->
  <path
    d="M76 158 L256 84 L436 158 L256 152 Z"
    fill="url(#stone)"
  />
  <!-- Pediment underline (architrave top edge) -->
  <rect x="76" y="158" width="360" height="6" fill="url(#stone)"/>

  <!-- Architrave (horizontal beam with name plate) -->
  <rect x="76" y="164" width="360" height="62" fill="#0a0e14"/>
  <text
    x="256" y="206"
    text-anchor="middle"
    font-family="Fraunces, Georgia, serif"
    font-size="44"
    font-weight="600"
    letter-spacing="14"
    fill="#c9a96e"
  >STOA</text>

  <!-- Bottom edge of architrave -->
  <rect x="76" y="226" width="360" height="6" fill="url(#stone)"/>

  <!-- Columns: 6 narrow columns. Slight taper handled by two rects per column. -->
  <g fill="url(#stone)">
    <!-- column 1 -->
    <rect x="100" y="232" width="20" height="180"/>
    <rect x="98" y="232" width="2" height="180" opacity="0.7"/>
    <rect x="120" y="232" width="2" height="180" opacity="0.4"/>
    <!-- column 2 -->
    <rect x="148" y="232" width="20" height="180"/>
    <rect x="146" y="232" width="2" height="180" opacity="0.7"/>
    <rect x="168" y="232" width="2" height="180" opacity="0.4"/>
    <!-- column 3 -->
    <rect x="196" y="232" width="20" height="180"/>
    <rect x="194" y="232" width="2" height="180" opacity="0.7"/>
    <rect x="216" y="232" width="2" height="180" opacity="0.4"/>
    <!-- column 4 -->
    <rect x="296" y="232" width="20" height="180"/>
    <rect x="294" y="232" width="2" height="180" opacity="0.7"/>
    <rect x="316" y="232" width="2" height="180" opacity="0.4"/>
    <!-- column 5 -->
    <rect x="344" y="232" width="20" height="180"/>
    <rect x="342" y="232" width="2" height="180" opacity="0.7"/>
    <rect x="364" y="232" width="2" height="180" opacity="0.4"/>
    <!-- column 6 -->
    <rect x="392" y="232" width="20" height="180"/>
    <rect x="390" y="232" width="2" height="180" opacity="0.7"/>
    <rect x="412" y="232" width="2" height="180" opacity="0.4"/>
  </g>

  <!-- Door — the deep wine of the entrance -->
  <rect x="220" y="248" width="72" height="164" fill="#5c1f1c"/>
  <rect x="216" y="244" width="80" height="8" fill="url(#stone)"/>
  <!-- Frame highlight -->
  <rect x="220" y="248" width="2" height="164" fill="#7a2624" opacity="0.5"/>
  <rect x="290" y="248" width="2" height="164" fill="#3a1311" opacity="0.6"/>

  <!-- Stylobate (base steps) -->
  <rect x="76" y="412" width="360" height="14" fill="url(#stone)"/>
  <rect x="60" y="426" width="392" height="14" fill="url(#stone)" opacity="0.92"/>
  <rect x="44" y="440" width="424" height="14" fill="url(#stone)" opacity="0.85"/>
</svg>
