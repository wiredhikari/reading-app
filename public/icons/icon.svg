<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Stoa — The Reading Room">
  <!-- Navy field, rounded square, matches the reference exactly. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d121a"/>
      <stop offset="100%" stop-color="#070a10"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#efe7d4"/>
      <stop offset="100%" stop-color="#dccfb1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Acroterion: small ball at the apex of the pediment -->
  <circle cx="256" cy="80" r="9" fill="url(#stone)"/>
  <line x1="256" y1="80" x2="256" y2="100" stroke="url(#stone)" stroke-width="3"/>

  <!-- Pediment outline (triangular roof). Drawn as a clean stroked triangle
       sitting on top of a thin tympanum band. -->
  <path
    d="M88 168 L256 96 L424 168"
    fill="none"
    stroke="url(#stone)"
    stroke-width="6"
    stroke-linejoin="round"
    stroke-linecap="round"
  />
  <!-- Top edge of architrave (closes the pediment underneath) -->
  <rect x="88" y="168" width="336" height="6" fill="url(#stone)"/>

  <!-- Architrave (frieze band with the STOA inscription) -->
  <rect x="88" y="174" width="336" height="68" fill="#0a0e14"/>
  <text
    x="256" y="220"
    text-anchor="middle"
    font-family="Fraunces, 'Iowan Old Style', Georgia, serif"
    font-size="46"
    font-weight="600"
    letter-spacing="14"
    fill="#c9a96e"
  >STOA</text>
  <!-- Bottom edge of architrave -->
  <rect x="88" y="242" width="336" height="6" fill="url(#stone)"/>

  <!-- Columns: 6 total (3 on each side of the door), with subtle fluting
       achieved by lighter/darker hairlines along each edge. Each column
       sits on its own capital + base. -->
  <g>
    <!-- Capital + base for column 1 -->
    <rect x="98" y="248" width="28" height="6" fill="url(#stone)"/>
    <rect x="98" y="408" width="28" height="6" fill="url(#stone)"/>
    <!-- Shaft -->
    <rect x="103" y="254" width="18" height="154" fill="url(#stone)"/>
    <line x1="107" y1="254" x2="107" y2="408" stroke="#c2b491" stroke-width="0.8" opacity="0.7"/>
    <line x1="113" y1="254" x2="113" y2="408" stroke="#c2b491" stroke-width="0.8" opacity="0.7"/>
    <line x1="118" y1="254" x2="118" y2="408" stroke="#c2b491" stroke-width="0.8" opacity="0.5"/>

    <!-- Column 2 -->
    <rect x="142" y="248" width="28" height="6" fill="url(#stone)"/>
    <rect x="142" y="408" width="28" height="6" fill="url(#stone)"/>
    <rect x="147" y="254" width="18" height="154" fill="url(#stone)"/>
    <line x1="151" y1="254" x2="151" y2="408" stroke="#c2b491" stroke-width="0.8" opacity="0.7"/>
    <line x1="157" y1="254" x2="157" y2="408" stroke="#c2b491" stroke-width="0.8" opacity="0.7"/>
    <line x1="162" y1="254" x2="162" y2="408" stroke="#c2b491" stroke-width="0.8" opacity="0.5"/>

    <!-- Column 3 -->
    <rect x="186" y="248" width="28" height="6" fill="url(#stone)"/>
    <rect x="186" y="408" width="28" height="6" fill="url(#stone)"/>
    <rect x="191" y="254" width="18" height="154" fill="url(#stone)"/>
    <line x1="195" y1="254" x2="195" y2="408" stroke="#c2b491" stroke-width="0.8" opacity="0.7"/>
    <line x1="201" y1="254" x2="201" y2="408" stroke="#c2b491" stroke-width="0.8" opacity="0.7"/>
    <line x1="206" y1="254" x2="206" y2="408" stroke="#c2b491" stroke-width="0.8" opacity="0.5"/>

    <!-- Column 4 (right of door) -->
    <rect x="298" y="248" width="28" height="6" fill="url(#stone)"/>
    <rect x="298" y="408" width="28" height="6" fill="url(#stone)"/>
    <rect x="303" y="254" width="18" height="154" fill="url(#stone)"/>
    <line x1="307" y1="254" x2="307" y2="408" stroke="#c2b491" stroke-width="0.8" opacity="0.7"/>
    <line x1="313" y1="254" x2="313" y2="408" stroke="#c2b491" stroke-width="0.8" opacity="0.7"/>
    <line x1="318" y1="254" x2="318" y2="408" stroke="#c2b491" stroke-width="0.8" opacity="0.5"/>

    <!-- Column 5 -->
    <rect x="342" y="248" width="28" height="6" fill="url(#stone)"/>
    <rect x="342" y="408" width="28" height="6" fill="url(#stone)"/>
    <rect x="347" y="254" width="18" height="154" fill="url(#stone)"/>
    <line x1="351" y1="254" x2="351" y2="408" stroke="#c2b491" stroke-width="0.8" opacity="0.7"/>
    <line x1="357" y1="254" x2="357" y2="408" stroke="#c2b491" stroke-width="0.8" opacity="0.7"/>
    <line x1="362" y1="254" x2="362" y2="408" stroke="#c2b491" stroke-width="0.8" opacity="0.5"/>

    <!-- Column 6 -->
    <rect x="386" y="248" width="28" height="6" fill="url(#stone)"/>
    <rect x="386" y="408" width="28" height="6" fill="url(#stone)"/>
    <rect x="391" y="254" width="18" height="154" fill="url(#stone)"/>
    <line x1="395" y1="254" x2="395" y2="408" stroke="#c2b491" stroke-width="0.8" opacity="0.7"/>
    <line x1="401" y1="254" x2="401" y2="408" stroke="#c2b491" stroke-width="0.8" opacity="0.7"/>
    <line x1="406" y1="254" x2="406" y2="408" stroke="#c2b491" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Door — deep wine, with a stone lintel above. -->
  <rect x="218" y="266" width="76" height="148" fill="#5c1f1c"/>
  <!-- Lintel above the door -->
  <rect x="212" y="260" width="88" height="8" fill="url(#stone)"/>

  <!-- Stylobate (three-tiered base steps). -->
  <rect x="88" y="414" width="336" height="14" fill="url(#stone)"/>
  <rect x="72" y="428" width="368" height="14" fill="url(#stone)" opacity="0.94"/>
  <rect x="56" y="442" width="400" height="14" fill="url(#stone)" opacity="0.88"/>
</svg>
