<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Stoa — The Reading Room</title>

    <!-- Theme color is updated dynamically by the theme module -->
    <meta name="theme-color" content="#faf9f5" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="Stoa — a quiet reading room for PDFs and EPUBs, with notes and AI companion. Synced across your devices." />

    <!-- iOS web app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Stoa" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Apple-touch-icon path is intentionally renamed (`stoa-180.png`) so
         iOS, which aggressively caches the apple-touch-icon by URL, treats
         this as a brand-new icon and replaces the legacy "RC" image on
         existing home-screen shortcuts. Re-add the shortcut after pushing. -->
    <link rel="apple-touch-icon" href="/icons/stoa-180.png" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Type -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..800,0..100&family=Inter:wght@300..700&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
