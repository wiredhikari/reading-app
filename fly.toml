# Fly.io configuration for reading-companion.
# See https://fly.io/docs/reference/configuration/
#
# `app` is filled in by `fly launch` the first time you deploy.
# Everything else is safe to keep as-is for a personal deployment.

primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  TRUST_PROXY = "1"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
